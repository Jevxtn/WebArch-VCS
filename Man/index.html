<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmmaNews - News Feed</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="logo">
                <i class="fas fa-newspaper"></i>
                <h1>EmmaNews</h1>
            </div>
            <nav class="nav">
                <ul>
                    <li><a href="#" data-category="general">All News</a></li>
                    <li><a href="#" data-category="technology">Technology</a></li>
                    <li><a href="#" data-category="business">Business</a></li>
                    <li><a href="#" data-category="science">Science</a></li>
                    <li><a href="#" data-category="health">Health</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-container">
        <section class="hero">
            <div class="hero-content">
                <h2>Stay Updated with Latest News</h2>
                <p>Discover the most recent articles from around the world</p>
            </div>
        </section>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Search articles...">
            <button id="searchBtn" class="search-btn">
                <i class="fas fa-search"></i>
            </button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading articles...</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <section class="articles-grid" id="articlesContainer">
            <!-- Articles will be loaded here dynamically -->
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 EmmaNews. All rights reserved.</p>
            <p>Developed by <a href="#" target="_blank">EMMAN</a></p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
